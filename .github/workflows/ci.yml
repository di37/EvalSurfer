name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v

      - name: Smoke-test the CLIs
        run: |
          python -m evalsurfer.interface.cli.metrics examples/traces.json --pretty
          echo '{"sample":{"answer":"x"}}' | python -m evalsurfer.interface.cli.plan -
          echo '{"retrieval":{"cases":[{"retrieved":["d1","d2"],"relevant":["d1"]}]}}' | python -m evalsurfer.interface.cli.quality -
          echo '{"op":"from_traces","traces":[{"query":"q1"},{"query":"q1"}],"name":"d","version":"v1"}' | python -m evalsurfer.interface.cli.dataset -
          echo '{"op":"krippendorff_alpha","reliability_data":[[1,1],[2,2]]}' | python -m evalsurfer.interface.cli.main agreement -

  # Exercises the optional MCP tool server. The `test` job above installs
  # only [dev], which proves the core stays importable with no mcp/pydantic (there
  # test_mcp_server.py self-skips). This job installs [mcp] so those tests run.
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (with dev + mcp extras)
        run: python -m pip install -e ".[dev,mcp]"

      - name: Run tests (including the MCP tool suite)
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v

      # The expected count comes from the test suite's pinned _TOOLS set (the
      # single source of truth), so adding a tool can never desync this step.
      - name: Smoke-test the MCP server (lists all tools)
        run: |
          python -c "import asyncio, evalsurfer.interface.mcp.server as s; from tests.interface.mcp.test_mcp_server import _TOOLS; n = len(asyncio.run(s.mcp.list_tools())); print(n, 'tools'); assert n == len(_TOOLS), (n, len(_TOOLS))"
