name: Publish

# Cuts both packages on a GitHub Release: the Python package to PyPI (via OIDC
# trusted publishing — no stored token) and the npm launcher wrapper to npm.
# Keep the version in pyproject.toml and npm/package.json in sync before tagging.
on:
  release:
    types: [published]

jobs:
  pypi:
    name: Publish evalsurfer to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # a re-run of an already-published version is a no-op, not a failure

  npm:
    name: Publish evalsurfer (npm launcher)
    runs-on: ubuntu-latest
    # Best-effort: the npm launcher is version-independent from the PyPI package
    # (it always pulls the latest evalsurfer[mcp] at runtime), so a npm publish
    # hiccup must not red the release. PyPI is the source of truth.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "evalsurfer@$version" version >/dev/null 2>&1; then
            echo "evalsurfer@$version already on npm — skipping."
          else
            npm publish --access public
          fi
